# Settings Sheet
EPS.Settings=Paramètres
EPS.Settings.Client=Client
EPS.Settings.Client.EnforcePM=Appliquez votre modèle de joueur
EPS.Settings.Client.EnforcePM.Desc=Si activé, le modèle de joueur que vous avez sélectionné sera protégé. Aucune autre fonction ne pourra plus modifier votre modèle de joueur.
EPS.Settings.Client.PlayerColorBG=Utiliser la couleur du joueur comme arrière-plan
EPS.Settings.Client.PlayerColorBG.Desc=Si activé, la couleur de joueur que vous avez choisie sera utilisée comme fond du menu. Si désactivé, le fond sera gris.
EPS.Settings.Client.TransparentBG=Fond transparent
EPS.Settings.Client.TransparentBG.Desc=Si activé, le fond du menu sera transparent. Si désactivé, le fond sera opaque.
EPS.Settings.Client.ShowFlexes=Afficher l’onglet Flexes
EPS.Settings.Client.ShowFlexes.Desc=Cela vous permet de manipuler les flexions sur votre modèle de joueur. Cependant, la manipulation des flexions n'est pas vraiment conçue pour les modèles de joueur et peut causer des problèmes. Cela inclut les éléments suivants:\n- Le clignement des yeux ne fonctionne plus.\n- Les visages pourraient être déformés à moins que les flexions ne soient corrigées manuellement.\n- Pourrait complètement casser les visages des modèles de personnages incompatibles.\n- Même si vous remettez tous les flexibles à leur valeur par défaut, le moteur les considère toujours comme manipulés. Les modèles avec des problèmes ne seront pas corrigés.\nVous devez changer de modèle une fois pour que l'onglet apparaisse !
EPS.Settings.Client.RebuildIcon=Reconstruire les icônes d'apparition
EPS.Settings.Client.RebuildIcon.Desc=Force tous les icônes des modèles de joueur à être re-rendus. Utile si les icônes sont dépassées après que les modèles personnalisés ont changé d'apparence. Cela peut prendre un certain temps, selon le nombre de modèles et la vitesse de votre PC.

EPS.Settings.Server=Serveur
EPS.Settings.Server.EnablePMEnforcement=Activer l'application du modèle de joueur
EPS.Settings.Server.EnablePMEnforcement.Desc=Si activé, les modèles de joueur sélectionnés seront appliqués et protégés. Aucun mode de jeu, carte ou addon ne pourra plus les remplacer. Les joueurs peuvent activer ou désactiver cette fonction individuellement en utilisant la case à cocher en haut du menu.\nSi désactivé, seul le bouton manuel fonctionne en dehors du Sandbox.
EPS.Settings.Server.AllowInstantChanges=Autoriser des changements instantanés
EPS.Settings.Server.AllowInstantChanges.Desc=Si activée, les joueurs peuvent appliquer leurs modifications instantanément au lieu de devoir réapparaître.
EPS.Settings.Server.AllowFlexes=Autoriser les joueurs de changer de flexes
EPS.Settings.Server.AllowFlexes.Desc=Si activé, les joueurs peuvent modifier les flexions de leurs modèles de personnage. Cela perturbera le clignement des yeux des joueurs et pourrait causer d'autres problèmes. À activer à vos risques et périls. Les joueurs ne peuvent réinitialiser leurs flexions qu'en se déconnectant.
EPS.Settings.Server.EnableInAllGM=Activer dans tous les modes de jeu
EPS.Settings.Server.EnableInAllGM.Desc=Si activé, le Sélecteur de Modèle de Joueur sera disponible pour tous les joueurs dans tous les modes de jeu. Si désactivé, seuls les administrateurs peuvent l'utiliser en dehors du mode Bac à sable.
EPS.Settings.Server.RequestLimit=Limite de requêtes
EPS.Settings.Server.RequestLimit.Desc=Délai en secondes que les joueurs doivent attendre avant de pouvoir utiliser à nouveau la fonction de changement instantané. Réglez sur 0 pour désactiver.

EPS.Settings.GM_Blacklist=Liste noire MDJ
EPS.Settings.GM_Blacklist.ExistedGM=Modes de jeu sur liste noire
EPS.Settings.GM_Blacklist.Desc=Ici, vous pouvez mettre sur liste noire les modes de jeu incompatibles.\n\nPlayers (including Admins) can't change their playermodels in those gamemodes, regardless of other settings.
EPS.Settings.GM_Blacklist.AddCurrent=Ajouter le mode de jeu actuel à la liste noire
EPS.Settings.GM_Blacklist.ManuallyAddGM=Ajouter manuellement le mode de jeu
EPS.Settings.GM_Blacklist.RemoveSelected=Supprimer les modes de jeu sélectionnés

