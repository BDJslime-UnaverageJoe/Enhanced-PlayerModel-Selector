EPS.Flexes=Flexes
EPS.Flexes.Notes=Notes:\n-L'aperçu du modèle pour les flexes ne fonctionne pas correctement. Cependant, ils seront visibles sur votre modèle de joueur lorsque vous les appliquerez.\n- Les valeurs par défaut fournies pourraient être incorrectes et provoquer des visages déformés.\n- Il n'y a aucun moyen de réinitialiser (ou de réparer) la manipulation de flex à part débrancher.

