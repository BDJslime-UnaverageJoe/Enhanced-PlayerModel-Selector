EPS.Settings.VOX.AvailableVOX=Pack VOX disponible
EPS.Settings.VOX.AssignToCurrent=Attribuer le pack VOX au modèle du joueur actuel
EPS.Settings.VOX.RemoveSelected=Supprimer l'affectation sélectionnée

