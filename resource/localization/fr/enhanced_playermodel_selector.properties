EPS.Favorites.LoadFavorite=Charger les favoris sélectionnés
EPS.Favorites.Desc=Ici, vous pouvez sauvegarder vos combinaisons des modèles de joueur préférées. Pour ce faire:\n1. Sélectionnez un modèle et configurez la peau et les groupes de corps comme vous le souhaitez.\n2. Entrez un nom unique dans le champ de texte et cliquez sur « Ajouter un nouveau favori ».\n3. Chargez votre favori en le sélectionnant dans la liste ci-dessous et en cliquant sur « Charger la sélection ».\nVous pouvez également appliquer les favoris existants via une commande console:\nplayermodel_loadfav "le nom du favori"
EPS.Favorites.AddNewFavorite=Ajouter un nouveau favori
